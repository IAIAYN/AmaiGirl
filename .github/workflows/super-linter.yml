# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  push:
    branches: [ "main", "dev", "feat/**" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  guard-platform-branch-diff:
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'dev' && (
        startsWith(github.head_ref, 'feat/windows') ||
        startsWith(github.head_ref, 'feat/linux') ||
        startsWith(github.head_ref, 'feat/macos')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve platform from branch
        id: platform
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_BRANCH" == feat/windows* ]]; then
            PLATFORM="windows"
          elif [[ "$HEAD_BRANCH" == feat/linux* ]]; then
            PLATFORM="linux"
          elif [[ "$HEAD_BRANCH" == feat/macos* ]]; then
            PLATFORM="macos"
          else
            echo "Unsupported platform branch: $HEAD_BRANCH" >&2
            exit 1
          fi
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"

      - name: Guard platform branch diff scope
        run: >-
          python3 scripts/check_platform_branch_diff.py
          --platform "${{ steps.platform.outputs.platform }}"
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.sha }}"
          --allowlist-file ".github/platform-diff-allowlist.txt"

  enforce-platform-branch-policy:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR head branch for dev
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          case "$HEAD_BRANCH" in
            feat/*)
              echo "Branch policy passed: $HEAD_BRANCH"
              ;;
            *)
              echo "PR to dev must come from feature branches:" >&2
              echo "  - feat/xxx" >&2
              echo "Current head branch: $HEAD_BRANCH" >&2
              exit 1
              ;;
          esac

  lint-platform-macro-style:
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feat/')) || (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feat/')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve target platform
        id: platform
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_BRANCH: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH="$HEAD_BRANCH"
          else
            BRANCH="$REF_NAME"
          fi

          if [[ "$BRANCH" == feat/windows* ]]; then
            PLATFORM="windows"
          elif [[ "$BRANCH" == feat/linux* ]]; then
            PLATFORM="linux"
          elif [[ "$BRANCH" == feat/macos* ]]; then
            PLATFORM="macos"
          else
            PLATFORM="all"
          fi
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "Resolved platform=$PLATFORM from branch=$BRANCH"

      - name: Enforce platform macro style
        run: python3 scripts/check_platform_macro_style.py --root src --platform "${{ steps.platform.outputs.platform }}"

  lint-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint C/C++ Code Scope
        uses: github/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: "main"
          FILTER_REGEX_INCLUDE: "(^|.*/)(src/.*\\.(c|cc|cpp|cxx|h|hh|hpp|hxx)|CMakeLists\\.txt)$"
          VALIDATE_CMAKE: true
          VALIDATE_CPP: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-basics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Basic Checks
        uses: github/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: "main"
          VALIDATE_GITLEAKS: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_YAML: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
